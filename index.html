<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        #header-panel {
            position: fixed;
            top: 10px;
            left: 50px;
            z-index: 9999;
            background: rgba(255,255,255,0.92);
            padding: 10px 15px;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        #header-panel strong {
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        #legend-panel {
            position: fixed;
            bottom: 30px;
            left: 50px;
            z-index: 9999;
            background: rgba(255,255,255,0.92);
            padding: 10px 14px;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            line-height: 1.8;
        }
        #legend-panel strong {
            font-size: 13px;
            display: block;
            margin-bottom: 4px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-circle {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid white;
            display: inline-block;
            box-shadow: 0 0 2px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }
        </style>
        <title></title>
    </head>
    <body>

        <!-- HEADER -->
        <div id="header-panel">
            <img src="logo_junji.png" height="38" style="margin-right:10px;" onerror="this.style.display='none'">
            <strong>JARDINES JUNJI CON ROBOS — REGIÓN DE VALPARAÍSO</strong>
        </div>

        <!-- LEYENDA -->
        <div id="legend-panel">
            <strong>Leyenda</strong>
            <div class="legend-item">
                <span class="legend-circle" style="background:rgba(255,84,0,0.8);"></span>
                Con robo registrado
            </div>
            <div class="legend-item">
                <span class="legend-circle" style="background:rgba(34,147,225,1.0);"></span>
                Obra paralizada con guardia
            </div>
            <div class="legend-item">
                <span class="legend-circle" style="background:rgba(255,241,20,1.0);"></span>
                Obra paralizada sin guardia
            </div>
            <div class="legend-item">
                <span class="legend-circle" style="background:rgba(8,48,107,0.5); width:10px; height:10px;"></span>
                Sin alertas
            </div>
        </div>

        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/Regionalcorregida_1.js"></script>
        <script src="data/comunas_2.js"></script>
        <script src="data/areas_pobladas_regin_valparasoareas_pobladas_3.js"></script>
        <script src="data/redvial2019_4.js"></script>
        <script src="data/jardines_junji_5.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-34.0,-72.0],[-31.5,-69.8]]);
        map.setMaxBounds([[-35.0,-73.5],[-30.5,-68.5]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

        function removeEmptyRowsFromPopupContent(content, feature) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var rows = tempDiv.querySelectorAll('tr');
            for (var i = 0; i < rows.length; i++) {
                var td = rows[i].querySelector('td.visible-with-data');
                var key = td ? td.id : '';
                if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                    rows[i].parentNode.removeChild(rows[i]);
                }
            }
            return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.update(); }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() { popup.update(); });
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {}

        map.createPane('pane_ESRIGraydark_0');
        map.getPane('pane_ESRIGraydark_0').style.zIndex = 400;
        var layer_ESRIGraydark_0 = L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
            pane: 'pane_ESRIGraydark_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        map.addLayer(layer_ESRIGraydark_0);

        function pop_Regionalcorregida_1(feature, layer) {
            var popupContent = '<table></table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }
        function style_Regionalcorregida_1_0() {
            return {
                pane: 'pane_Regionalcorregida_1',
                opacity: 1,
                color: 'rgba(255,255,255,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 3.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
        map.createPane('pane_Regionalcorregida_1');
        map.getPane('pane_Regionalcorregida_1').style.zIndex = 401;
        map.getPane('pane_Regionalcorregida_1').style['mix-blend-mode'] = 'normal';
        var layer_Regionalcorregida_1 = new L.geoJson(json_Regionalcorregida_1, {
            attribution: '',
            interactive: false,
            dataVar: 'json_Regionalcorregida_1',
            layerName: 'layer_Regionalcorregida_1',
            pane: 'pane_Regionalcorregida_1',
            onEachFeature: pop_Regionalcorregida_1,
            style: style_Regionalcorregida_1_0,
        });
        bounds_group.addLayer(layer_Regionalcorregida_1);
        map.addLayer(layer_Regionalcorregida_1);

        function pop_comunas_2(feature, layer) {
            var popupContent = '<table></table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }
        function style_comunas_2_0() {
            return {
                pane: 'pane_comunas_2',
                opacity: 1,
                color: 'rgba(255,255,255,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,255,255,0.14901960784313725)',
                interactive: false,
            }
        }
        map.createPane('pane_comunas_2');
        map.getPane('pane_comunas_2').style.zIndex = 402;
        map.getPane('pane_comunas_2').style['mix-blend-mode'] = 'normal';
        var layer_comunas_2 = new L.geoJson(json_comunas_2, {
            attribution: '',
            interactive: false,
            dataVar: 'json_comunas_2',
            layerName: 'layer_comunas_2',
            pane: 'pane_comunas_2',
            onEachFeature: pop_comunas_2,
            style: style_comunas_2_0,
        });
        bounds_group.addLayer(layer_comunas_2);
        map.addLayer(layer_comunas_2);

        function pop_areas_pobladas_regin_valparasoareas_pobladas_3(feature, layer) {
            var popupContent = '<table></table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }
        function style_areas_pobladas_regin_valparasoareas_pobladas_3_0() {
            return {
                pane: 'pane_areas_pobladas_regin_valparasoareas_pobladas_3',
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,255,255,0.7019607843137254)',
                interactive: false,
            }
        }
        map.createPane('pane_areas_pobladas_regin_valparasoareas_pobladas_3');
        map.getPane('pane_areas_pobladas_regin_valparasoareas_pobladas_3').style.zIndex = 403;
        map.getPane('pane_areas_pobladas_regin_valparasoareas_pobladas_3').style['mix-blend-mode'] = 'normal';
        var layer_areas_pobladas_regin_valparasoareas_pobladas_3 = new L.geoJson(json_areas_pobladas_regin_valparasoareas_pobladas_3, {
            attribution: '',
            interactive: false,
            dataVar: 'json_areas_pobladas_regin_valparasoareas_pobladas_3',
            layerName: 'layer_areas_pobladas_regin_valparasoareas_pobladas_3',
            pane: 'pane_areas_pobladas_regin_valparasoareas_pobladas_3',
            onEachFeature: pop_areas_pobladas_regin_valparasoareas_pobladas_3,
            style: style_areas_pobladas_regin_valparasoareas_pobladas_3_0,
        });
        bounds_group.addLayer(layer_areas_pobladas_regin_valparasoareas_pobladas_3);
        map.addLayer(layer_areas_pobladas_regin_valparasoareas_pobladas_3);

        function pop_redvial2019_4(feature, layer) {
            var popupContent = '<table></table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }
        function style_redvial2019_4_0() {
            return {
                pane: 'pane_redvial2019_4',
                opacity: 1,
                color: 'rgba(229,182,54,1.0)',
                dashArray: '',
                lineCap: 'round',
                lineJoin: 'round',
                weight: 1.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
        map.createPane('pane_redvial2019_4');
        map.getPane('pane_redvial2019_4').style.zIndex = 404;
        map.getPane('pane_redvial2019_4').style['mix-blend-mode'] = 'normal';
        var layer_redvial2019_4 = new L.geoJson(json_redvial2019_4, {
            attribution: '',
            interactive: false,
            dataVar: 'json_redvial2019_4',
            layerName: 'layer_redvial2019_4',
            pane: 'pane_redvial2019_4',
            onEachFeature: pop_redvial2019_4,
            style: style_redvial2019_4_0,
        });
        bounds_group.addLayer(layer_redvial2019_4);
        map.addLayer(layer_redvial2019_4);

        function pop_jardines_junji_5(feature, layer) {
            var p = feature.properties;
            function val(key) {
                return p[key] !== null && p[key] !== undefined
                    ? autolinker.link(String(p[key]).replace(/'/g, "'").toLocaleString())
                    : '—';
            }
            var popupContent = '<table style="min-width:220px;">\
                <tr>\
                    <th colspan="2" style="text-align:center; font-size:12px; font-weight:bold; letter-spacing:1px; padding:6px 0 8px 0; border-bottom: 2px solid #333;">JARDINES JUNJI</th>\
                </tr>\
                <tr><th scope="row">Nombre</th><td>' + val('nombre') + '</td></tr>\
                <tr><th scope="row">Comuna</th><td>' + val('comuna') + '</td></tr>\
                <tr><th scope="row">Programa</th><td>' + val('programa') + '</td></tr>\
                <tr><th scope="row">Estado</th><td>' + val('estado') + '</td></tr>\
                <tr><td colspan="2" style="padding:4px 0;"><hr style="border:none; border-top:1px solid #ccc; margin:0;"></td></tr>\
                <tr><th scope="row">Obra Paralizada</th><td>' + val('obra_paralizada') + '</td></tr>\
                <tr><th scope="row">Con Guardias</th><td>' + val('con_guardias') + '</td></tr>\
                <tr><th scope="row">Tiene Robo</th><td>' + val('tiene_robo') + '</td></tr>\
                <tr><th scope="row">Fecha Robo</th><td>' + val('fecha_robo') + '</td></tr>\
                <tr><th scope="row">Detalle Incidente</th><td>' + val('detalle_incidente') + '</td></tr>\
            </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        map.createPane('pane_jardines_alertas');
        map.getPane('pane_jardines_alertas').style.zIndex = 410;
        map.createPane('pane_jardines_junji_5');
        map.getPane('pane_jardines_junji_5').style.zIndex = 405;
        map.getPane('pane_jardines_junji_5').style['mix-blend-mode'] = 'normal';

        function style_jardines_junji_5_0(feature) {
            var context = { feature: feature, variables: {} };
            if (exp_jardines_junji_5rule0_eval_expression(context)) {
                return {
                    pane: 'pane_jardines_alertas',
                    radius: 14.0, opacity: 1,
                    color: 'rgba(255,255,255,1.0)',
                    weight: 1, fill: true, fillOpacity: 1,
                    fillColor: 'rgba(227,26,28,1.0)', interactive: true,
                };
            } else if (exp_jardines_junji_5rule1_eval_expression(context)) {
                return {
                    pane: 'pane_jardines_alertas',
                    radius: 14.0, opacity: 1,
                    color: 'rgba(255,255,255,1.0)',
                    weight: 1, fill: true, fillOpacity: 1,
                    fillColor: 'rgba(34,147,225,1.0)', interactive: true,
                };
            } else if (exp_jardines_junji_5rule2_eval_expression(context)) {
                return {
                    pane: 'pane_jardines_alertas',
                    radius: 14.0, opacity: 1,
                    color: 'rgba(255,255,255,1.0)',
                    weight: 1, fill: true, fillOpacity: 1,
                    fillColor: 'rgba(255,241,20,1.0)', interactive: true,
                };
            } else if (exp_jardines_junji_5rule3_eval_expression(context)) {
                return {
                    pane: 'pane_jardines_junji_5',
                    radius: 6.0, opacity: 1,
                    color: 'rgba(255,255,255,1.0)',
                    weight: 1, fill: true, fillOpacity: 1,
                    fillColor: 'rgba(8,48,107,0.5)', interactive: true,
                };
            } else {
                return {fill: false, stroke: false};
            }
        }

        var layer_jardines_junji_5 = new L.geoJson(json_jardines_junji_5, {
            attribution: '',
            interactive: true,
            dataVar: 'json_jardines_junji_5',
            layerName: 'layer_jardines_junji_5',
            pane: 'pane_jardines_junji_5',
            onEachFeature: pop_jardines_junji_5,
            pointToLayer: function (feature, latlng) {
                var context = { feature: feature, variables: {} };
                return L.circleMarker(latlng, style_jardines_junji_5_0(feature));
            },
        });
        bounds_group.addLayer(layer_jardines_junji_5);
        map.addLayer(layer_jardines_junji_5);
        setBounds();

        var i = 0;
        layer_comunas_2.eachLayer(function(layer) {
            var context = { feature: layer.feature, variables: {} };
            layer.bindTooltip((layer.feature.properties['Comuna'] !== null ? String('<div style="color: #ffffff; font-size: 7pt; font-family: \'DINPro\', sans-serif;">' + layer.feature.properties['Comuna']) + '</div>' : ''), {permanent: true, offset: [-0, -16], className: 'css_comunas_2'});
            labels.push(layer);
            totalMarkers += 1;
            layer.added = true;
            addLabel(layer, i);
            i++;
        });
        resetLabels([layer_comunas_2]);
        map.on("zoomend", function(){ resetLabels([layer_comunas_2]); });
        map.on("layeradd", function(){ resetLabels([layer_comunas_2]); });
        map.on("layerremove", function(){ resetLabels([layer_comunas_2]); });
        </script>
    </body>
</html>
